<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Events | Koa's Lounge</title>

  <link rel="stylesheet" href="/assets/css/styles.css?v=2" />

  <style>
    body {
      background: #1d2332;
      color: #ffffff;
      font-family: Arial, sans-serif;
      margin: 0;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 20px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    .status {
      margin-bottom: 20px;
      opacity: 0.8;
    }

    .section {
      margin-top: 40px;
    }

    .events-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .event-card {
      background: #303a52;
      padding: 20px;
      border-radius: 14px;
    }

    .event-title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .event-meta {
      font-size: 14px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>Koa's Lounge Events</h1>

    <div class="status" data-events-status>
      Loading upcoming events...
    </div>

    <div class="section">
      <h2>Tonight</h2>
      <div class="events-grid" data-group-tonight></div>
    </div>

    <div class="section">
      <h2>This Weekend</h2>
      <div class="events-grid" data-group-weekend></div>
    </div>

    <div class="section">
      <h2>Upcoming</h2>
      <div class="events-grid" data-group-upcoming></div>
    </div>

  </div>

  <!-- IMPORTANT: cache-busted JS -->
  <script src="/assets/js/events-calendar.js?v=2"></script>

</body>
</html>
