<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Events | Koa's Lounge</title>
  <meta
    name="description"
    content="Live events at Koa's Lounge in Pāhoa. See tonight, this weekend, and upcoming events."
  />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="/assets/css/styles.css?v=4" />
</head>
<body class="events-page">
  <header class="site-header">
    <div class="container site-header__inner">
      <a class="brand" href="/index.html" aria-label="Koa's Lounge home">
        <img src="/assets/img/logo.png" alt="Koa's Lounge logo" />
        <div class="brand__text">
          <span class="brand__eyebrow">Pāhoa, Hawaiʻi</span>
          <span class="brand__name">Koa's Lounge</span>
        </div>
      </a>

      <nav class="nav" aria-label="Primary">
        <a href="/index.html">Home</a>
        <a href="/about.html">About</a>
        <a href="/events.html" aria-current="page">Events</a>
        <a href="/menu.html">Menu</a>
        <a href="/contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="events-hero">
      <div class="container">
        <div class="events-hero__wrap">
          <div>
            <p class="events-hero__eyebrow">Live Calendar</p>
            <h1 class="events-hero__title">Koa’s Lounge Events</h1>
            <p class="events-hero__subtitle">
              Live from our Office 365 calendar.
            </p>
          </div>

          <div class="events-hero__spotlight">
            <div class="events-hero__spotlight-label">Spotlight</div>
            <div class="events-hero__spotlight-title" data-hero-spotlight-title>
              Loading events...
            </div>
            <div class="events-hero__spotlight-copy" data-hero-spotlight-copy>
              Please wait while the live calendar loads.
            </div>
          </div>
        </div>

        <div class="events-status">
          <div class="events-status__text" data-events-status>Loading upcoming events...</div>
          <div class="events-status__source" data-events-source></div>
        </div>
      </div>
    </section>

    <section class="events-sections">
      <div class="container">
        <section class="events-block">
          <div class="events-block__header">
            <h2 class="events-block__title" data-title-tonight>Tonight</h2>
            <div class="events-block__count" data-count-tonight>0 events</div>
          </div>
          <div class="events-grid" data-group-tonight></div>
        </section>

        <section class="events-block">
          <div class="events-block__header">
            <h2 class="events-block__title">This Weekend</h2>
            <div class="events-block__count" data-count-weekend>0 events</div>
          </div>
          <div class="events-grid" data-group-weekend></div>
        </section>

        <section class="events-block">
          <div class="events-block__header">
            <h2 class="events-block__title">Upcoming</h2>
            <div class="events-block__count" data-count-upcoming>0 events</div>
          </div>
          <div class="events-grid" data-group-upcoming></div>
        </section>
      </div>
    </section>
  </main>

  <script src="/assets/js/events-calendar.js?v=4"></script>
</body>
</html>
